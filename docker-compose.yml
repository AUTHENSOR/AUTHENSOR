services:
  # PostgreSQL for receipts and policy storage
  postgres:
    image: postgres:16-alpine
    container_name: authensor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authensor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authensor_dev}
      POSTGRES_DB: ${POSTGRES_DB:-authensor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authensor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Control Plane API (built from local source)
  control-plane:
    build:
      context: .
      dockerfile: packages/control-plane/Dockerfile
    container_name: authensor-control-plane
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://authensor:authensor_dev@postgres:5432/authensor
      PORT: 3000
      # Bootstrap: set this on first run to auto-create an admin API key
      # The key will be printed to stdout on startup
      AUTHENSOR_BOOTSTRAP_ADMIN_TOKEN: ${AUTHENSOR_BOOTSTRAP_ADMIN_TOKEN:-}
      # Safety defaults: fail-closed without a policy
      AUTHENSOR_ALLOW_FALLBACK_POLICY: ${AUTHENSOR_ALLOW_FALLBACK_POLICY:-false}
      # Sandbox mode for safe testing (stub = no real API calls)
      AUTHENSOR_SANDBOX_MODE: ${AUTHENSOR_SANDBOX_MODE:-real}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      # Mount source for hot reload in dev
      - ./packages/control-plane/src:/app/packages/control-plane/src
      - ./packages/engine/src:/app/packages/engine/src
      - ./packages/schemas/src:/app/packages/schemas/src

  # MCP Server (for local testing)
  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    container_name: authensor-mcp-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      CONTROL_PLANE_URL: http://control-plane:3000
      # Integration credentials (from .env)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - ./packages/mcp-server/src:/app/packages/mcp-server/src

volumes:
  postgres_data:
