<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9d1d9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(20, 8)">
    <!-- Shield shape -->
    <path d="M28,4 L52,14 L52,34 C52,50 40,60 28,64 C16,60 4,50 4,34 L4,14 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner check/lock -->
    <circle cx="28" cy="30" r="8" fill="none" stroke="#e94560" stroke-width="2"/>
    <rect x="25" y="28" width="6" height="8" rx="1" fill="#e94560"/>
    <rect x="23" y="35" width="10" height="8" rx="2" fill="none" stroke="#533483" stroke-width="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="85" y="50" fill="url(#textGrad)" font-size="36" font-weight="700" letter-spacing="-0.5">authensor</text>

  <!-- Tagline -->
  <text x="86" y="68" fill="#7d8590" font-size="12" letter-spacing="2">SAFETY STACK FOR AI AGENTS</text>
</svg>
