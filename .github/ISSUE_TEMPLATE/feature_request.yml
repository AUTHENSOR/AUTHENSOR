name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Authensor is built on the belief that safety tooling should not have a paywall — every contribution makes agents safer for everyone.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which product area does this relate to?
      options:
        - "Policy Engine"
        - "Control Plane API"
        - "Aegis (Content Safety)"
        - "Sentinel (Monitoring)"
        - "MCP Server"
        - "SDK (TypeScript)"
        - "SDK (Python)"
        - "CLI"
        - "Framework Adapters"
        - "SafeClaw"
        - "SiteSitter"
        - "Documentation"
        - "Compliance (OWASP, EU AI Act, NIST)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it enable?
      placeholder: |
        When I try to ... I need to ... but currently ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API examples, policy rules, or CLI commands if relevant.
    validations:
      required: false

  - type: textarea
    id: standards
    attributes:
      label: Standards Alignment
      description: Does this relate to any standards? (OWASP ASI01-10, EU AI Act articles, NIST AI RMF, ISO 42001)
    validations:
      required: false
