[project]
name = "authensor"
version = "0.1.0"
description = "The open-source safety stack for AI agents. Policy enforcement, content scanning, approval workflows, and cryptographic audit trails."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Authensor Team" }]
keywords = ["authensor", "ai-safety", "agent-safety", "guardrails", "policy-engine", "authorization", "ai-agent", "agentic-ai", "content-safety", "prompt-injection", "audit-trail", "mcp", "security"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Framework :: AsyncIO",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.5.0",
]

[project.urls]
Homepage = "https://authensor.com"
Documentation = "https://authensor.com/docs"
Repository = "https://github.com/authensor/authensor"
"Source Code" = "https://github.com/authensor/authensor/tree/main/packages/sdk-py"
Changelog = "https://github.com/authensor/authensor/blob/main/CHANGELOG.md"
"Bug Tracker" = "https://github.com/authensor/authensor/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
    "datamodel-code-generator>=0.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["authensor"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
authensor-gen = "authensor.codegen:main"
